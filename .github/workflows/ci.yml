name: CI

permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches: [main]

jobs:
  server-tests:
    name: Server tests
    runs-on: ubuntu-latest

    env:
      solution_file: ./HaddySimHub.sln
      dotnet_version: '10.0.100'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.dotnet_version }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.solution_file }}

      - name: Build
        run: dotnet build ${{ env.solution_file }} --no-restore

      - name: Test with coverage
        run: dotnet test ${{ env.solution_file }} --no-restore --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        with:
          name: server-coverage
          path: '**/coverage/coverage.info'
          retention-days: 7

  clientapp-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ClientApp
    env:
      node-version: 24

    steps:
      - uses: actions/checkout@v5

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('ClientApp/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.node-version }}

      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run tests with coverage
        run: npm run coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v5
        with:
          name: frontend-coverage
          path: ClientApp/coverage/lcov.info
          retention-days: 7

  coverage-comment:
    name: Coverage summary
    runs-on: ubuntu-latest
    needs: [server-tests, clientapp-tests]
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download server coverage
        uses: actions/download-artifact@v5
        with:
          name: server-coverage
          path: ./coverage/server

      - name: Download frontend coverage
        uses: actions/download-artifact@v5
        with:
          name: frontend-coverage
          path: ./coverage/frontend

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Generate workflow summary
        run: |
          echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Backend coverage
          echo "### Backend (.NET)" >> $GITHUB_STEP_SUMMARY
          if [ -f "./coverage/server/coverage.info" ]; then
            lcov --list ./coverage/server/coverage.info 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Coverage file found" >> $GITHUB_STEP_SUMMARY
          else
            echo "No coverage file found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Frontend coverage
          echo "### Frontend (TypeScript)" >> $GITHUB_STEP_SUMMARY
          if [ -f "./coverage/frontend/lcov.info" ]; then
            lcov --list ./coverage/frontend/lcov.info 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Coverage file found" >> $GITHUB_STEP_SUMMARY
          else
            echo "No coverage file found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        run: |
          # Create comment file
          cat > /tmp/coverage_comment.md << 'EOF'
          ## Code Coverage Report

          ### Backend (.NET)
          ```
          EOF
          
          if [ -f "./coverage/server/coverage.info" ]; then
            lcov --list ./coverage/server/coverage.info 2>/dev/null | tail -6 >> /tmp/coverage_comment.md
          else
            echo "No coverage file found" >> /tmp/coverage_comment.md
          fi
          
          cat >> /tmp/coverage_comment.md << 'EOF'
          ```

          ### Frontend (TypeScript)
          ```
          EOF
          
          if [ -f "./coverage/frontend/lcov.info" ]; then
            lcov --list ./coverage/frontend/lcov.info 2>/dev/null | tail -6 >> /tmp/coverage_comment.md
          else
            echo "No coverage file found" >> /tmp/coverage_comment.md
          fi
          
          echo '```' >> /tmp/coverage_comment.md
          
          # Post comment using GitHub CLI
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/coverage_comment.md


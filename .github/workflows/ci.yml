name: CI

permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches: [main]

jobs:
  server-tests:
    name: Server tests
    runs-on: ubuntu-latest

    env:
      solution_file: ./HaddySimHub.sln
      dotnet_version: '10.0.100'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.dotnet_version }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.solution_file }}

      - name: Build
        run: dotnet build ${{ env.solution_file }} --no-restore

      - name: Test with coverage
        run: dotnet test ${{ env.solution_file }} --no-restore --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        with:
          name: server-coverage
          path: '**/coverage/coverage.info'
          retention-days: 7

  clientapp-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ClientApp
    env:
      node-version: 24

    steps:
      - uses: actions/checkout@v5

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('ClientApp/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.node-version }}

      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run tests with coverage
        run: npm run coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v5
        with:
          name: frontend-coverage
          path: ClientApp/coverage/lcov.info
          retention-days: 7

  coverage-comment:
    name: Coverage summary
    runs-on: ubuntu-latest
    needs: [server-tests, clientapp-tests]
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download server coverage
        uses: actions/download-artifact@v5
        with:
          name: server-coverage
          path: ./coverage/server

      - name: Download frontend coverage
        uses: actions/download-artifact@v5
        with:
          name: frontend-coverage
          path: ./coverage/frontend

      - name: Generate workflow summary
        run: |
          echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Backend coverage summary
          echo "### Backend (.NET)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -f "./coverage/server/coverage.info" ]; then
            # Extract summary from lcov file
            SERVER_FILE="./coverage/server/coverage.info"
            TOTAL_LINES=$(grep "^LF:" "$SERVER_FILE" | cut -d: -f2)
            COVERED_LINES=$(grep "^LH:" "$SERVER_FILE" | cut -d: -f2)
            TOTAL_FUNCS=$(grep "^FNF:" "$SERVER_FILE" | cut -d: -f2)
            COVERED_FUNCS=$(grep "^FNH:" "$SERVER_FILE" | cut -d: -f2)
            TOTAL_BRANCHES=$(grep "^BRF:" "$SERVER_FILE" | cut -d: -f2)
            COVERED_BRANCHES=$(grep "^BRH:" "$SERVER_FILE" | cut -d: -f2)
            
            LINE_PCT="0"
            if [ "$TOTAL_LINES" -gt 0 ]; then
              LINE_PCT=$(awk "BEGIN {printf \"%.1f\", ($COVERED_LINES/$TOTAL_LINES)*100}")
            fi
            FUNC_PCT="0"
            if [ "$TOTAL_FUNCS" -gt 0 ]; then
              FUNC_PCT=$(awk "BEGIN {printf \"%.1f\", ($COVERED_FUNCS/$TOTAL_FUNCS)*100}")
            fi
            BRANCH_PCT="0"
            if [ "$TOTAL_BRANCHES" -gt 0 ]; then
              BRANCH_PCT=$(awk "BEGIN {printf \"%.1f\", ($COVERED_BRANCHES/$TOTAL_BRANCHES)*100}")
            fi
            
            echo "| Metric   | Coverage |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
            echo "| Lines    | $LINE_PCT%   |" >> $GITHUB_STEP_SUMMARY
            echo "| Functions| $FUNC_PCT%   |" >> $GITHUB_STEP_SUMMARY
            echo "| Branches | $BRANCH_PCT%   |" >> $GITHUB_STEP_SUMMARY
          else
            echo "No coverage file found" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Frontend coverage summary
          echo "### Frontend (TypeScript)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -f "./coverage/frontend/lcov.info" ]; then
            # Extract summary from lcov file
            FRONTEND_FILE="./coverage/frontend/lcov.info"
            TOTAL_LINES=$(grep "^LH:" "$FRONTEND_FILE" | cut -d: -f2)
            COVERED_LINES=$(grep "^LF:" "$FRONTEND_FILE" | cut -d: -f2)
            TOTAL_FUNCS=$(grep "^FNH:" "$FRONTEND_FILE" | cut -d: -f2)
            COVERED_FUNCS=$(grep "^FNF:" "$FRONTEND_FILE" | cut -d: -f2)
            TOTAL_BRANCHES=$(grep "^BRH:" "$FRONTEND_FILE" | cut -d: -f2)
            COVERED_BRANCHES=$(grep "^BRF:" "$FRONTEND_FILE" | cut -d: -f2)
            
            # Swap for frontend format
            TEMP=$TOTAL_LINES
            TOTAL_LINES=$COVERED_LINES
            COVERED_LINES=$TEMP
            
            LINE_PCT="0"
            if [ "$TOTAL_LINES" -gt 0 ]; then
              LINE_PCT=$(awk "BEGIN {printf \"%.1f\", ($COVERED_LINES/$TOTAL_LINES)*100}")
            fi
            FUNC_PCT="0"
            if [ "$TOTAL_FUNCS" -gt 0 ]; then
              FUNC_PCT=$(awk "BEGIN {printf \"%.1f\", ($COVERED_FUNCS/$TOTAL_FUNCS)*100}")
            fi
            BRANCH_PCT="0"
            if [ "$TOTAL_BRANCHES" -gt 0 ]; then
              BRANCH_PCT=$(awk "BEGIN {printf \"%.1f\", ($COVERED_BRANCHES/$TOTAL_BRANCHES)*100}")
            fi
            
            echo "| Metric   | Coverage |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
            echo "| Lines    | $LINE_PCT%   |" >> $GITHUB_STEP_SUMMARY
            echo "| Functions| $FUNC_PCT%   |" >> $GITHUB_STEP_SUMMARY
            echo "| Branches | $BRANCH_PCT%   |" >> $GITHUB_STEP_SUMMARY
          else
            echo "No coverage file found" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Build comment body
          cat > /tmp/coverage_comment.md << 'EOF'
          ## Code Coverage Report
          EOF
          
          # Backend coverage
          echo "" >> /tmp/coverage_comment.md
          echo "### Backend (.NET)" >> /tmp/coverage_comment.md
          echo '```' >> /tmp/coverage_comment.md
          if [ -f "./coverage/server/coverage.info" ]; then
            SERVER_FILE="./coverage/server/coverage.info"
            TOTAL_LINES=$(grep "^LF:" "$SERVER_FILE" | cut -d: -f2)
            COVERED_LINES=$(grep "^LH:" "$SERVER_FILE" | cut -d: -f2)
            TOTAL_FUNCS=$(grep "^FNF:" "$SERVER_FILE" | cut -d: -f2)
            COVERED_FUNCS=$(grep "^FNH:" "$SERVER_FILE" | cut -d: -f2)
            TOTAL_BRANCHES=$(grep "^BRF:" "$SERVER_FILE" | cut -d: -f2)
            COVERED_BRANCHES=$(grep "^BRH:" "$SERVER_FILE" | cut -d: -f2)
            
            LINE_PCT="0"
            if [ "$TOTAL_LINES" -gt 0 ]; then
              LINE_PCT=$(awk "BEGIN {printf \"%.1f\", ($COVERED_LINES/$TOTAL_LINES)*100}")
            fi
            FUNC_PCT="0"
            if [ "$TOTAL_FUNCS" -gt 0 ]; then
              FUNC_PCT=$(awk "BEGIN {printf \"%.1f\", ($COVERED_FUNCS/$TOTAL_FUNCS)*100}")
            fi
            BRANCH_PCT="0"
            if [ "$TOTAL_BRANCHES" -gt 0 ]; then
              BRANCH_PCT=$(awk "BEGIN {printf \"%.1f\", ($COVERED_BRANCHES/$TOTAL_BRANCHES)*100}")
            fi
            
            echo "| Metric   | Coverage |" >> /tmp/coverage_comment.md
            echo "|----------|----------|" >> /tmp/coverage_comment.md
            echo "| Lines    | $LINE_PCT%   |" >> /tmp/coverage_comment.md
            echo "| Functions| $FUNC_PCT%   |" >> /tmp/coverage_comment.md
            echo "| Branches | $BRANCH_PCT%   |" >> /tmp/coverage_comment.md
          else
            echo "No coverage file found" >> /tmp/coverage_comment.md
          fi
          echo '```' >> /tmp/coverage_comment.md
          
          # Frontend coverage
          echo "" >> /tmp/coverage_comment.md
          echo "### Frontend (TypeScript)" >> /tmp/coverage_comment.md
          echo '```' >> /tmp/coverage_comment.md
          if [ -f "./coverage/frontend/lcov.info" ]; then
            FRONTEND_FILE="./coverage/frontend/lcov.info"
            TOTAL_LINES=$(grep "^LH:" "$FRONTEND_FILE" | cut -d: -f2)
            COVERED_LINES=$(grep "^LF:" "$FRONTEND_FILE" | cut -d: -f2)
            TOTAL_FUNCS=$(grep "^FNH:" "$FRONTEND_FILE" | cut -d: -f2)
            COVERED_FUNCS=$(grep "^FNF:" "$FRONTEND_FILE" | cut -d: -f2)
            TOTAL_BRANCHES=$(grep "^BRH:" "$FRONTEND_FILE" | cut -d: -f2)
            COVERED_BRANCHES=$(grep "^BRF:" "$FRONTEND_FILE" | cut -d: -f2)
            
            TEMP=$TOTAL_LINES
            TOTAL_LINES=$COVERED_LINES
            COVERED_LINES=$TEMP
            
            LINE_PCT="0"
            if [ "$TOTAL_LINES" -gt 0 ]; then
              LINE_PCT=$(awk "BEGIN {printf \"%.1f\", ($COVERED_LINES/$TOTAL_LINES)*100}")
            fi
            FUNC_PCT="0"
            if [ "$TOTAL_FUNCS" -gt 0 ]; then
              FUNC_PCT=$(awk "BEGIN {printf \"%.1f\", ($COVERED_FUNCS/$TOTAL_FUNCS)*100}")
            fi
            BRANCH_PCT="0"
            if [ "$TOTAL_BRANCHES" -gt 0 ]; then
              BRANCH_PCT=$(awk "BEGIN {printf \"%.1f\", ($COVERED_BRANCHES/$TOTAL_BRANCHES)*100}")
            fi
            
            echo "| Metric   | Coverage |" >> /tmp/coverage_comment.md
            echo "|----------|----------|" >> /tmp/coverage_comment.md
            echo "| Lines    | $LINE_PCT%   |" >> /tmp/coverage_comment.md
            echo "| Functions| $FUNC_PCT%   |" >> /tmp/coverage_comment.md
            echo "| Branches | $BRANCH_PCT%   |" >> /tmp/coverage_comment.md
          else
            echo "No coverage file found" >> /tmp/coverage_comment.md
          fi
          echo '```' >> /tmp/coverage_comment.md
          
          # Post comment using GitHub CLI
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/coverage_comment.md

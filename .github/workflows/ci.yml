name: CI

permissions:
  contents: read

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches: [main]

jobs:
  server-tests:
    name: Server tests
    runs-on: ubuntu-latest

    env:
      solution_file: ./HaddySimHub.sln
      dotnet_version: '10.0.100'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.dotnet_version }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.solution_file }}

      - name: Build
        run: dotnet build ${{ env.solution_file }} --no-restore

      - name: Test with coverage
        run: dotnet test ${{ env.solution_file }} --no-restore --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        with:
          name: server-coverage-report
          path: '**/coverage/**/*'
          retention-days: 7

  clientapp-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ClientApp/src
    env:
      node-version: 24

    steps:
      - uses: actions/checkout@v5

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('ClientApp/src/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.node-version }}

      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run tests with coverage
        run: npm run coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v5
        with:
          name: frontend-coverage-report
          path: ClientApp/src/coverage/**/*
          retention-days: 7

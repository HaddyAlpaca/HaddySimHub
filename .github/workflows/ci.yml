name: CI

permissions:
  contents: read

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches: [main]

jobs:
  server-tests:
    name: Server tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      solution_file: ./HaddySimHub.sln
      dotnet_version: '10.0.201'

    steps:
      - name: Checkout
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0

      - name: Cache NuGet packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install .NET Core
        uses: actions/setup-dotnet@87b7050bc53ea08284295505d98d2aa94301e852 # v4.2.0
        with:
          dotnet-version: ${{ env.dotnet_version }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.solution_file }}

      - name: Build
        run: dotnet build ${{ env.solution_file }} --no-restore

      - name: Test with coverage
        run: dotnet test ${{ env.solution_file }} --no-restore --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload coverage report
        uses: actions/upload-artifact@604373da6381bf24206979c74d06a550515601b9 # v4.4.1
        with:
          name: server-coverage
          path: 'HaddySimHub.Tests/coverage/coverage.info'
          retention-days: 7

      - name: Diagnostic info on failure
        if: failure()
        run: |
          echo "::group::Environment"
          dotnet --list-sdks
          dotnet --info
          echo "::endgroup::"

  clientapp-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./ClientApp
    env:
      node_version: 24.15.0

    steps:
      - uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0

      - name: Cache node modules
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('ClientApp/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.node_version }}

      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run tests with coverage
        run: npm run coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@604373da6381bf24206979c74d06a550515601b9 # v4.4.1
        with:
          name: frontend-coverage
          path: ClientApp/coverage/lcov.info
          retention-days: 7

      - name: Diagnostic info on failure
        if: failure()
        run: |
          echo "::group::Environment"
          node --version
          npm --version
          echo "::endgroup::"

  coverage-comment:
    name: Coverage summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [server-tests, clientapp-tests]
    permissions:
      contents: read
      pull-requests: write
    env:
      node_version: 24.15.0

    steps:
      - name: Checkout
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0

      - name: Download server coverage
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: server-coverage
          path: ./coverage/server

      - name: Download frontend coverage
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: frontend-coverage
          path: ./coverage/frontend

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.node_version }}

      - name: Generate coverage summary
        run: node .github/workflows/scripts/coverage-summary.js > /tmp/coverage_summary.txt

      - name: Generate workflow summary
        run: |
          echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat /tmp/coverage_summary.txt >> $GITHUB_STEP_SUMMARY

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "## Code Coverage Report" > /tmp/coverage_comment.md
          echo "" >> /tmp/coverage_comment.md
          cat /tmp/coverage_summary.txt >> /tmp/coverage_comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/coverage_comment.md

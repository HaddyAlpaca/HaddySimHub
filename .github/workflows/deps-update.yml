name: Dependency Update

on:
  schedule:
    - cron: '0 6 1,15 * *'  # 1st and 15th of each month at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  dotnet_version: '10.0.201'
  node_version: 24.15.0

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0

      - name: Setup .NET
        uses: actions/setup-dotnet@87b7050bc53ea08284295505d98d2aa94301e852 # v4.2.0
        with:
          dotnet-version: ${{ env.dotnet_version }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.node_version }}

      - name: Create branch
        run: |
          BRANCH="deps/update-$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Update .NET dependencies
        run: |
          dotnet tool install --global dotnet-outdated-tool
          dotnet outdated --upgrade

      - name: Detect latest .NET SDK version
        id: dotnet-sdk
        run: |
          RELEASES=$(curl -sL https://dotnetcli.blob.core.windows.net/dotnet/release-metadata/releases-index.json)
          # Find the latest LTS or current-major channel, preferring the highest major
          CHANNEL=$(echo "$RELEASES" | jq -r '[.channels[] | select(.release-type == "LTS" or .channel-version == "10.0")] | sort_by(.channel-version | split(".") | map(tonumber)) | last')
          LATEST_SDK=$(echo "$CHANNEL" | jq -r '.["latest-sdk"] // empty')
          CHANNEL_VER=$(echo "$CHANNEL" | jq -r '.["channel-version"] // empty')

          if [ -z "$LATEST_SDK" ]; then
            echo "Could not determine latest SDK, keeping current: ${{ env.dotnet_version }}"
            echo "full_version=${{ env.dotnet_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "full_version=$LATEST_SDK" >> "$GITHUB_OUTPUT"
            echo "channel=$CHANNEL_VER" >> "$GITHUB_OUTPUT"
            echo "Latest .NET SDK: $LATEST_SDK (channel $CHANNEL_VER)"
          fi

      - name: Detect latest LTS Node.js version
        id: node-lts
        run: |
          LTS_INFO=$(curl -sL https://nodejs.org/dist/index.json | jq '[.[] | select(.lts != false)] | first')
          if [ -z "$LTS_INFO" ] || [ "$LTS_INFO" = "null" ]; then
            echo "No LTS release found, keeping current: ${{ env.node_version }}"
            echo "full_version=${{ env.node_version }}" >> "$GITHUB_OUTPUT"
          else
            LTS_FULL=$(echo "$LTS_INFO" | jq -r '.version' | sed 's/^v//')
            echo "full_version=$LTS_FULL" >> "$GITHUB_OUTPUT"
            echo "Latest Node LTS: $LTS_FULL"
          fi

      - name: Update npm dependencies
        working-directory: ./ClientApp
        run: |
          SAVED_ENGINES=$(node -e "
            try {
              const p = require('./package.json');
              console.log(JSON.stringify({ node: p.engines?.node, npm: p.engines?.npm }));
            } catch { console.log('{}'); }
          ")

          npx npm-check-updates@latest -u 2>/dev/null || true
          npm install --package-lock-only

          node -e "
            const p = require('./package.json');
            const saved = $SAVED_ENGINES;
            if (saved.node) p.engines = p.engines || {};
            if (saved.node) p.engines.node = saved.node;
            if (saved.npm) p.engines.npm = saved.npm;
            require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Bump Node.js version to latest LTS
        run: |
          NEW_NODE="${{ steps.node-lts.outputs.full_version }}"
          OLD_NODE="${{ env.node_version }}"

          # Only bump if the new LTS version is actually newer (major.minor compare)
          if [ "$(printf '%s\n' "$OLD_NODE" "$NEW_NODE" | sort -t. -k1,1n -k2,2n | tail -1)" = "$OLD_NODE" ]; then
            echo "Current Node $OLD_NODE is already at or above LTS $NEW_NODE, skipping bump"
            exit 0
          fi

          echo "Bumping Node.js version from $OLD_NODE to $NEW_NODE"

          # Update engines.node in package.json
          node -e "
            const p = require('./ClientApp/package.json');
            const prefix = (p.engines?.node || '').replace(/[\\d.]+$/, '');
            p.engines.node = prefix + '$NEW_NODE';
            require('fs').writeFileSync('./ClientApp/package.json', JSON.stringify(p, null, 2) + '\n');
          "

          # Update node_version in all workflow files
          for f in .github/workflows/*.yml; do
            sed -i "s/^\\([[:space:]]*node_version:\\) .*$/\\1 $NEW_NODE/" "$f"
          done

      - name: Bump .NET SDK version to latest
        run: |
          NEW_SDK="${{ steps.dotnet-sdk.outputs.full_version }}"
          OLD_SDK="${{ env.dotnet_version }}"

          if [ "$NEW_SDK" = "$OLD_SDK" ]; then
            echo "Already at latest SDK $OLD_SDK, skipping bump"
            exit 0
          fi

          # Compare versions — only bump if new is actually newer
          HIGHER=$(printf '%s\n' "$OLD_SDK" "$NEW_SDK" | sort -V | tail -1)
          if [ "$HIGHER" = "$OLD_SDK" ]; then
            echo "Current SDK $OLD_SDK is newer than $NEW_SDK, skipping bump"
            exit 0
          fi

          echo "Bumping .NET SDK from $OLD_SDK to $NEW_SDK"

          # Update global.json
          node -e "
            const g = require('./global.json');
            g.sdk.version = '$NEW_SDK';
            require('fs').writeFileSync('./global.json', JSON.stringify(g, null, 2) + '\n');
          "

          # Update dotnet_version in all workflow files
          for f in .github/workflows/*.yml; do
            sed -i "s/^\\([[:space:]]*dotnet_version:\\) .*$/\\1 '$NEW_SDK'/" "$f"
          done

      - name: Commit and push
        run: |
          git config user.name "haddy-simhub-bot"
          git config user.email "bot@haddysimhub.dev"
          git add -A
          if git diff --staged --quiet; then
            echo "No dependency updates available"
            echo "HAS_CHANGES=false" >> "$GITHUB_ENV"
          else
            git commit -m "chore(deps): update frontend and backend dependencies"
            git push origin "$BRANCH"
            echo "HAS_CHANGES=true" >> "$GITHUB_ENV"
          fi

      - name: Create Pull Request
        if: env.HAS_CHANGES == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "chore(deps): update dependencies ($(date +%Y-%m-%d))" \
            --body "Automated fortnightly dependency update.

          This PR updates:
          - Backend (.NET) NuGet packages to latest versions
          - Frontend (npm) packages to latest compatible versions

          CI will run automatically; if all checks pass this PR will be merged." \
            --base main \
            --head "$BRANCH" \
            --label "dependencies"

      - name: Wait for CI and merge
        if: env.HAS_CHANGES == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Waiting for CI checks on PR branch $BRANCH..."

          for i in $(seq 1 30); do
            sleep 60

            CHECKS=$(gh pr checks "$BRANCH" --json state,conclusion 2>/dev/null || echo "[]")
            if [ "$CHECKS" = "[]" ]; then
              echo "Poll $i/30: no check runs found yet, retrying..."
              continue
            fi

            ALL_DONE=true
            ALL_PASSED=true
            FAILED_CONCLUSIONS=""

            while IFS=$'\t' read -r state conclusion; do
              if [ "$state" != "COMPLETED" ]; then
                ALL_DONE=false
              fi
              if [ "$conclusion" = "FAILURE" ] || [ "$conclusion" = "CANCELLED" ] || [ "$conclusion" = "TIMED_OUT" ]; then
                ALL_PASSED=false
                FAILED_CONCLUSIONS="$FAILED_CONCLUSIONS $conclusion"
              fi
            done < <(echo "$CHECKS" | jq -r '.[] | [.state, .conclusion] | @tsv')

            if $ALL_DONE && $ALL_PASSED; then
              echo "All CI checks passed. Merging PR..."
              gh pr merge "$BRANCH" --squash --delete-branch
              echo "PR merged successfully!"
              exit 0
            fi

            if $ALL_DONE && ! $ALL_PASSED; then
              echo "CI checks failed:$FAILED_CONCLUSIONS"
              gh pr comment "$BRANCH" --body "⚠️ CI checks failed ($FAILED_CONCLUSIONS). Manual intervention required."
              exit 1
            fi

            echo "Poll $i/30: checks still running..."
          done

          echo "Timed out waiting for CI checks after 30 minutes"
          gh pr comment "$BRANCH" --body "⏰ Timed out waiting for CI checks (30 min). Manual intervention required."
          exit 1

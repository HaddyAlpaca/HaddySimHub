name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

# Allow only 1 CD workflow at a time
concurrency:
  group: cd
  cancel-in-progress: false

jobs:
  ci:
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml
  
  create_release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: ci
    permissions:
      contents: write
    defaults: 
      run:
        shell: bash

    env:
      app_path: ./HaddySimHub
      dotnet_version: '10.0.201'
      node_version: 24.12.0
      clientapp_folder: './ClientApp/'
      dist_folder: './dist'
      RELEASE_VERSION: v0.1.${{github.run_number}}
      solution_file: ./HaddySimHub.sln

    steps:
    - name: Checkout
      uses: actions/checkout@8cd0fa63d2e928ffbf25a989be38cb6ec11dea52 # v4.2.0

    - name: Cache NuGet packages
      uses: actions/cache@0e89c1f7a69b1f38e8fb2f0c6c0e52c48fa965d9 # v4.2.0
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Install .NET Core
      uses: actions/setup-dotnet@9ecf80bbf47ee4a3fb9bb8c76b80fef4a7cf2b93 # v4.2.0
      with:
        dotnet-version: ${{ env.dotnet_version }}

    - name: Restore dependencies
      run: dotnet restore ${{ env.solution_file }} --runtime win-x64

    - name: Publish server app
      run: dotnet publish ./HaddySimHub -r win-x64 --output ${{ env.dist_folder }} --no-restore
    
    - name: Publish updater app
      run: dotnet publish ./HaddySimHubUpdater -r win-x64 --output ${{ env.dist_folder }}/Updater --no-restore
    
    - name: Cache node modules
      uses: actions/cache@0e89c1f7a69b1f38e8fb2f0c6c0e52c48fa965d9 # v4.2.0
      with:
        path: ~/.npm
        key: npm-${{ runner.os }}-${{ hashFiles('ClientApp/package-lock.json') }}
        restore-keys: |
          npm-${{ runner.os }}-

    - name: Install Node.js
      uses: actions/setup-node@1e60f620b9541d41e9a5fcca3fc78cbd3e51b44f # v4.1.1
      with:
        node-version: ${{ env.node_version }}
    
    - name: Install client app dependencies
      working-directory: ${{ env.clientapp_folder }}
      run: npm ci

    - name: Build client app
      working-directory: ${{ env.clientapp_folder }}
      run: npm run build --omit=dev

    - name: Copy client app to distribution folder
      run: |
        mkdir -p ${{ env.dist_folder }}/wwwroot
        cp -r ${{ env.clientapp_folder }}dist/haddy-sim-hub-client/browser/* ${{ env.dist_folder }}/wwwroot/

    - name: Zip build result
      run: |
        cd ${{ env.dist_folder }}
        zip -r ../haddy-simhub.zip ./*

    - name: Create release and upload assets
      run: |
        gh release create ${{ env.RELEASE_VERSION }} haddy-simhub.zip --title "Release ${{ env.RELEASE_VERSION }}" --notes "Automated Release" --draft=false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Diagnostic info on failure
      if: failure()
      run: |
        echo "::group::Environment"
        dotnet --list-sdks
        node --version
        npm --version
        echo "::endgroup::"
        echo "::group::Disk Usage"
        du -sh ${{ env.dist_folder }} || true
        echo "::endgroup::"
